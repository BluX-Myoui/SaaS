{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Pedidos</h2>
    <a href="{{ url_for('pedidos_new') }}" class="btn btn-info text-white">+ Nuevo Pedido</a>
</div>

<table class="table table-striped table-hover bg-white shadow-sm rounded">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in pedidos %}
        <tr>
            <td>#{{ p.id }}</td>
            <td>{{ p.fecha }}</td>
            <td>{{ p.cliente_nombre }}</td>
            <td><span class="badge bg-secondary">{{ p.estado | capitalize }}</span></td>
            <td>
                <a href="{{ url_for('pedido_view', pedido_id=p.id) }}" class="btn btn-sm btn-primary">Ver Detalle</a>
                <form action="{{ url_for('pedido_delete', pedido_id=p.id) }}" method="POST" class="d-inline" onsubmit="return confirm('¿Borrar pedido completo?');">
                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
