{% extends "base.html" %}
{% block content %}
<h2>{{ 'Editar' if mode == 'edit' else 'Nuevo' }} Producto</h2>
<div class="card shadow-sm mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Nombre *</label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre if producto else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>SKU (Referencia)</label>
                    <input type="text" name="sku" class="form-control" value="{{ producto.sku if producto else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Precio *</label>
                    <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio if producto else '0.00' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Stock *</label>
                    <input type="number" name="stock" class="form-control" value="{{ producto.stock if producto else '0' }}" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('productos_list') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
