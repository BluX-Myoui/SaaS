{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Productos</h2>
    <a href="{{ url_for('productos_new') }}" class="btn btn-success">+ Nuevo Producto</a>
</div>

<form method="GET" class="mb-4 d-flex">
    <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre o SKU..." value="{{ q }}">
    <button type="submit" class="btn btn-secondary">Buscar</button>
</form>

<table class="table table-striped table-hover bg-white shadow-sm rounded">
    <thead class="table-dark">
        <tr>
            <th>SKU</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.sku }}</td>
            <td>{{ p.nombre }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="{{ url_for('productos_edit', producto_id=p.id) }}" class="btn btn-sm btn-warning">Editar</a>
                <form action="{{ url_for('productos_delete', producto_id=p.id) }}" method="POST" class="d-inline" onsubmit="return confirm('¿Seguro que deseas borrar este producto?');">
                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
