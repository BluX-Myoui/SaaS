{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Clientes</h2>
    <a href="{{ url_for('clientes_new') }}" class="btn btn-primary">+ Nuevo Cliente</a>
</div>

<form method="GET" class="mb-4 d-flex">
    <input type="text" name="q" class="form-control me-2" placeholder="Buscar por nombre, email..." value="{{ q }}">
    <button type="submit" class="btn btn-secondary">Buscar</button>
</form>

<table class="table table-striped table-hover bg-white shadow-sm rounded">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre y Apellidos</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.nombre }} {{ c.apellidos }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.telefono }}</td>
            <td>
                <a href="{{ url_for('clientes_edit', cliente_id=c.id) }}" class="btn btn-sm btn-warning">Editar</a>
                <form action="{{ url_for('clientes_delete', cliente_id=c.id) }}" method="POST" class="d-inline" onsubmit="return confirm('¿Seguro que deseas borrar este cliente?');">
                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
