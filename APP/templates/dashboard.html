{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Panel de Control</h2>
<div class="row">
    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title">Clientes</h5>
                <p class="card-text">Gestiona tu cartera de clientes.</p>
                <a href="{{ url_for('clientes_list') }}" class="btn btn-outline-primary">Ver Clientes</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title">Productos</h5>
                <p class="card-text">Controla tu inventario y precios.</p>
                <a href="{{ url_for('productos_list') }}" class="btn btn-outline-success">Ver Productos</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title">Pedidos</h5>
                <p class="card-text">Administra las ventas realizadas.</p>
                <a href="{{ url_for('pedidos_list') }}" class="btn btn-outline-info">Ver Pedidos</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
